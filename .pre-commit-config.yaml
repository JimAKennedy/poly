repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '^(\.gsd/|\.bg-shell/|.*\.uidesc$)'
      - id: end-of-file-fixer
        exclude: '^(\.gsd/|\.bg-shell/|.*\.uidesc$)'
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-case-conflict

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.5
    hooks:
      - id: clang-format
        types_or: [c, c++]

  - repo: https://github.com/cmake-lint/cmake-lint
    rev: 1.4.3
    hooks:
      - id: cmakelint

  # region:local-hooks
  - repo: local
    hooks:
      - id: check-pragma-once
        name: Check pragma once in headers
        entry: scripts/check-pragma-once.sh
        language: script
        files: '\.(h|hpp)$'
      - id: check-realtime-safety
        name: Check real-time safety
        entry: scripts/check-realtime-safety.sh
        language: script
        pass_filenames: false
      - id: check-snippet-regions
        name: Check CodeSnippet region markers exist
        entry: scripts/check-snippet-regions.sh
        language: script
        pass_filenames: false
      - id: pre-push-check
        name: Pre-push quality gate
        entry: scripts/pre-push-check.sh
        language: script
        pass_filenames: false
        stages: [pre-push]
  # endregion:local-hooks

ci:
  skip: [check-pragma-once, check-realtime-safety, check-snippet-regions, pre-push-check]
