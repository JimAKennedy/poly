name: NFR Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  nfr-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Download nightly baseline
        id: baseline
        uses: dawidd6/action-download-artifact@bf251b5aa9c2f7eeb574a96ee720e24f801b7c11 # v6
        with:
          name: nfr-review-baseline
          workflow: nfr-review-nightly.yml
          branch: main
          search_artifacts: true
          if_no_artifact_found: warn
        continue-on-error: true

      - name: Run NFR Review
        uses: JimAKennedy/nfr-review@f1b1fedc96c944547abe6dda995c1883a4e60707 # v1
        with:
          baseline: ${{ steps.baseline.outcome == 'success' && 'nfr-review-output.jsonl' || '' }}
          fail-on: "red"
