name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'engine/**'
      - 'webui/**'
      - 'CMakeLists.txt'
      - 'scripts/build-wasm.sh'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      wasm_sha256: ${{ steps.wasm-hash.outputs.wasm_sha256 }}
      js_sha256: ${{ steps.wasm-hash.outputs.js_sha256 }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Check site asset references
        run: bash scripts/check-site-assets.sh
      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@6ab9eb1bda2574c4ddb79809fc9247783eaf9021 # v14
        with:
          version: 3.1.61
      - name: Build WASM
        run: bash scripts/build-wasm.sh
      - name: Compute WASM sha256 for freshness gate
        id: wasm-hash
        run: |
          wasm_sha=$(sha256sum build-wasm/poly_engine.wasm | awk '{print $1}')
          js_sha=$(sha256sum build-wasm/poly_engine.js | awk '{print $1}')
          echo "wasm_sha256=${wasm_sha}" >> "$GITHUB_OUTPUT"
          echo "js_sha256=${js_sha}" >> "$GITHUB_OUTPUT"
          echo "poly_engine.wasm sha256: ${wasm_sha}"
          echo "poly_engine.js   sha256: ${js_sha}"
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install dependencies
        working-directory: site
        run: npm ci
      - name: Build
        working-directory: site
        run: |
          npm run generate-presets
          npm run copy-webui
          cp ../build-wasm/poly_engine.js ../build-wasm/poly_engine.wasm public/webui/
          npx astro build
      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

  verify-deployed:
    needs: [build, deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install dependencies
        working-directory: site
        run: npm ci
      - name: Get Playwright version
        id: pw-version
        working-directory: site
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.pw-version.outputs.version }}
      - name: Install Playwright browsers
        working-directory: site
        run: npx playwright install --with-deps chromium
      - name: Run remote audio + preset-consistency gates
        env:
          POLY_EXPECTED_WASM_SHA256: ${{ needs.build.outputs.wasm_sha256 }}
          POLY_EXPECTED_JS_SHA256: ${{ needs.build.outputs.js_sha256 }}
        run: bash scripts/site-verify-remote.sh "${{ needs.deploy.outputs.page_url }}"
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: site-remote-verify-report
          path: site/playwright-report/
          retention-days: 14
          if-no-files-found: ignore
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: site-remote-verify-test-results
          path: site/test-results/
          retention-days: 14
          if-no-files-found: ignore
      - name: Upload remote-verify summary artifacts
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: site-remote-verify-summaries
          path: .gsd/artifacts/
          retention-days: 14
          if-no-files-found: ignore
