name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'engine/**'
      - 'webui/**'
      - 'CMakeLists.txt'
      - 'scripts/build-wasm.sh'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Check site asset references
        run: bash scripts/check-site-assets.sh
      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@6ab9eb1bda2574c4ddb79809fc9247783eaf9021 # v14
        with:
          version: 3.1.61
      - name: Build WASM
        run: bash scripts/build-wasm.sh
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install dependencies
        working-directory: site
        run: npm ci
      - name: Build
        working-directory: site
        run: |
          npm run copy-webui
          cp ../build-wasm/poly_engine.js ../build-wasm/poly_engine.wasm public/webui/
          npx astro build
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

  verify-deployed:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install dependencies
        working-directory: site
        run: npm ci
      - name: Get Playwright version
        id: pw-version
        working-directory: site
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.pw-version.outputs.version }}
      - name: Install Playwright browsers
        working-directory: site
        run: npx playwright install --with-deps chromium
      - name: Run remote audio + preset-consistency gates
        run: bash scripts/site-verify-remote.sh "${{ needs.deploy.outputs.page_url }}"
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: site-remote-verify-report
          path: site/playwright-report/
          retention-days: 14
          if-no-files-found: ignore
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: site-remote-verify-test-results
          path: site/test-results/
          retention-days: 14
          if-no-files-found: ignore
      - name: Upload remote-verify summary artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: site-remote-verify-summaries
          path: .gsd/artifacts/
          retention-days: 14
          if-no-files-found: ignore
