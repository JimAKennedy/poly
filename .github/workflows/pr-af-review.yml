name: PR-AF Review (opt-in)

# Deep architectural review by Agent-Field's PR-AF (https://github.com/Agent-Field/pr-af).
# Opt-in only: triggers when a maintainer adds the `pr-af` label to a PR.
# Runtime is ~35–50 min and each run consumes OpenRouter credits — do not add to
# the required-checks list. Add the label when you specifically want a second
# opinion beyond our NFR review and /code-review ultra.
#
# Prerequisite: repo secret `OPENROUTER_API_KEY` must be set. Without it the
# workflow will start but the reviewer agent will fail.
#
# Setup + trigger instructions: docs/pr-af-review.md

on:
  pull_request:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-af-review:
    if: github.event.label.name == 'pr-af'
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout PR-AF
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: Agent-Field/pr-af
          path: pr-af

      - name: Start AgentField & PR-AF
        working-directory: ./pr-af
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker compose up -d
          sleep 15

      - name: Execute deep architectural audit
        working-directory: ./pr-af
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          python3 scripts/ci_runner.py
