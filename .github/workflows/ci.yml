name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - run: pip install pre-commit
      - run: pre-commit run --all-files

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            cmake-args: -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=arm64 -DBUILD_VISUAL_TESTS=ON -DBUILD_INTERACTION_TESTS=ON -DSMTG_RUN_VST_VALIDATOR=ON
          - os: ubuntu-latest
            cmake-args: -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_INTERACTION_TESTS=ON -DSMTG_RUN_VST_VALIDATOR=ON
          - os: windows-2022
            cmake-args: -G "Visual Studio 17 2022" -DSMTG_RUN_VST_VALIDATOR=ON
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y ninja-build libx11-dev libxcb1-dev libxkbcommon-x11-dev libx11-xcb-dev libxcb-util-dev libxcb-cursor-dev libxcb-keysyms1-dev libxcb-xkb-dev libxkbcommon-dev libfontconfig1-dev libcairo2-dev libgtkmm-3.0-dev libsqlite3-dev libxcb-util0-dev
      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja
      - name: Cache VST3 SDK
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: build/_deps/vst3sdk-src
          key: vst3sdk-${{ matrix.os }}-${{ hashFiles('CMakeLists.txt') }}
      - name: Cache GoogleTest
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: build/_deps/googletest-src
          key: gtest-${{ matrix.os }}-${{ hashFiles('tests/CMakeLists.txt') }}
      - name: Configure
        run: cmake -S . -B build ${{ matrix.cmake-args }}
      - name: Build
        run: cmake --build build --config Release --parallel
      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure
      - name: Upload visual diffs
        if: failure() && runner.os == 'macOS'
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: visual-diffs
          path: build/tests/visual_output/*_diff.png
          retention-days: 14
          if-no-files-found: ignore
      - name: Upload plugin
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: plugin-${{ matrix.os }}
          path: build/**/*.vst3
          retention-days: 14

  engine-isolation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install Ninja
        run: sudo apt-get install -y ninja-build
      - name: Configure engine-only (no VST3 SDK)
        run: cmake -S . -B build-engine -G Ninja -DCMAKE_BUILD_TYPE=Release -DPOLY_ENGINE_ONLY=ON
      - name: Build engine
        run: cmake --build build-engine --parallel
      - name: Run engine tests
        run: ctest --test-dir build-engine --output-on-failure
      - name: Verify no VST3 SDK fetched
        run: |
          if [ -d "build-engine/_deps/vst3sdk-src" ]; then
            echo "::error::Engine build fetched VST3 SDK — isolation violated"
            exit 1
          fi

  secrets-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  code-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install dependencies
        run: sudo apt-get install -y ninja-build lcov
      - name: Configure with coverage
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DENABLE_COVERAGE=ON -DPOLY_ENGINE_ONLY=ON
      - name: Build and test
        run: |
          cmake --build build
          ctest --test-dir build --output-on-failure
      - name: Generate coverage
        run: |
          lcov --capture --directory build --output-file coverage.info \
               --ignore-errors mismatch
          lcov --remove coverage.info '/usr/*' '*/build/_deps/*' '*/tests/*' \
               --output-file coverage.filtered.info
          genhtml coverage.filtered.info --output-directory coverage-report
      - name: Check 60% threshold
        run: |
          COVERAGE=$(lcov --summary coverage.filtered.info 2>&1 | grep 'lines' | awk '{print $2}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 60" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% below 60% threshold"
            exit 1
          fi
      - name: Upload to Codecov
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
        with:
          files: coverage.filtered.info
          fail_ci_if_error: false
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: coverage-report
          path: coverage-report/

  webui-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - name: Install dependencies
        working-directory: webui
        run: npm ci
      - name: Get Playwright version
        id: pw-version
        working-directory: webui
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.pw-version.outputs.version }}
      - name: Install Playwright browsers
        working-directory: webui
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        working-directory: webui
        run: npx playwright test
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: webui-html-report
          path: webui/playwright-report/
          retention-days: 14
          if-no-files-found: ignore
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: webui-test-results
          path: webui/test-results/
          retention-days: 14
          if-no-files-found: ignore
      - name: Upload UI screenshots
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: webui-screenshots
          path: webui/test-results/screenshots/
          retention-days: 30
          if-no-files-found: ignore

  # M048 S13: pluginval was previously a matrix job with 2 legs (macOS, Linux).
  # PR #104 (run 29990515657) revealed two matrix-related bugs in GitHub Actions:
  #   1. `needs.pluginval.result` in ci-complete reported `success` while the
  #      ubuntu leg was still `in_progress` — allowing ci-complete to pass
  #      advisorily against a leg that hadn't finalized.
  #   2. The ubuntu leg's outer job envelope stayed `in_progress` indefinitely
  #      after all its steps had completed successfully. Manual re-run was
  #      required to make GitHub finalize the check run.
  # Fix: split into two explicit jobs so ci-complete's `needs` list references
  # two individually-tracked check runs, each of which GitHub finalizes on its
  # own. `build` remains a matrix (3 legs, no observed bug, split would add
  # substantial churn); revisit if the same class of failure surfaces there.

  pluginval-macos:
    needs: build
    runs-on: macos-14
    steps:
      - name: Download plugin artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: plugin-macos-14
          path: plugin
      - name: Find VST3 bundle
        id: find-vst3
        run: |
          VST3_PATH=$(find plugin -name "*.vst3" -not -name "*probe*" -type d | head -1)
          echo "path=$VST3_PATH" >> "$GITHUB_OUTPUT"
          echo "Found VST3 at: $VST3_PATH"
      - name: Download pluginval
        run: |
          curl -fsSL -o pluginval.zip https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_macOS.zip
          unzip -q pluginval.zip
      - name: Run pluginval
        run: |
          chmod +x "pluginval.app/Contents/MacOS/pluginval"
          "pluginval.app/Contents/MacOS/pluginval" \
            --strictness-level 8 \
            --skip-gui-tests \
            --timeout-ms 120000 \
            --validate "${{ steps.find-vst3.outputs.path }}"

  pluginval-linux:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download plugin artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: plugin-ubuntu-latest
          path: plugin
      - name: Find VST3 bundle
        id: find-vst3
        run: |
          VST3_PATH=$(find plugin -name "*.vst3" -not -name "*probe*" -type d | head -1)
          echo "path=$VST3_PATH" >> "$GITHUB_OUTPUT"
          echo "Found VST3 at: $VST3_PATH"
      - name: Download pluginval
        run: |
          curl -fsSL -o pluginval.zip https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Linux.zip
          unzip -q pluginval.zip
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libfreetype6-dev libx11-dev libxcomposite-dev libxcursor-dev libxext-dev libxinerama-dev libxrandr-dev libxrender-dev libcairo2-dev libfontconfig1-dev libxcb1-dev libxkbcommon-x11-dev libx11-xcb-dev libxcb-util-dev libxcb-cursor-dev libxcb-keysyms1-dev libxcb-xkb-dev libxkbcommon-dev libgtkmm-3.0-dev libsqlite3-dev libxcb-util0-dev
      - name: Run pluginval
        run: |
          chmod +x pluginval
          xvfb-run -a ./pluginval \
            --strictness-level 8 \
            --skip-gui-tests \
            --timeout-ms 120000 \
            --validate "${{ steps.find-vst3.outputs.path }}"

  wasm-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@6ab9eb1bda2574c4ddb79809fc9247783eaf9021 # v14
        with:
          version: 3.1.61
      - name: Configure WASM build
        run: emcmake cmake -S . -B build-wasm -DPOLY_ENGINE_ONLY=ON
      - name: Build WASM
        run: cmake --build build-wasm --target poly_wasm --parallel
      - name: Report artifact sizes
        run: |
          WASM_SIZE=$(wc -c < build-wasm/poly_engine.wasm)
          JS_SIZE=$(wc -c < build-wasm/poly_engine.js)
          echo "### WASM Build" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`poly_engine.wasm\`: ${WASM_SIZE} bytes" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`poly_engine.js\`: ${JS_SIZE} bytes" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload WASM artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: wasm-build
          path: |
            build-wasm/poly_engine.wasm
            build-wasm/poly_engine.js
          retention-days: 14

  site-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install site dependencies (for js-yaml in claim tests)
        working-directory: site
        run: npm ci
      - name: Check doc taxonomy (M048 S01)
        run: bash scripts/check-doc-taxonomy.sh
      - name: Check behavioral claims (M048 S09)
        run: node scripts/check-behavioral-claims.mjs
      - name: Check status prose (M048 S10)
        run: node scripts/check-status-prose.mjs
      - name: Check count drift (M048 S06)
        run: bash scripts/check-count-drift.sh
      - name: Check bridge schema coverage (M048 S07)
        run: node scripts/check-bridge-schema-coverage.mjs
      - name: Check music-theory claim fixtures (M048 S08)
        working-directory: site
        run: node --test tests/euclidean-claims.test.mjs tests/appendix-euclidean-claims.test.mjs tests/prose-pattern-claims.test.mjs
      - name: Check site asset references
        run: bash scripts/check-site-assets.sh
      - name: Validate sample manifest (strict)
        run: bash scripts/check-sample-manifest.sh --strict
      - name: Validate sample manifest (GM coverage)
        run: bash scripts/check-sample-manifest.sh --coverage

  doc-drift:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - run: pip install pyyaml
      - name: Check doc drift (M048 S02)
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: bash scripts/check-doc-drift.sh

  # region:site-e2e-job
  site-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@6ab9eb1bda2574c4ddb79809fc9247783eaf9021 # v14
        with:
          version: 3.1.61
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install site dependencies
        working-directory: site
        run: npm ci
      - name: Check generated doc regions match params_def.h (M048 S05)
        run: |
          node site/scripts/generate-params-json.mjs
          bash scripts/check-generated-docs.sh
      - name: Get Playwright version
        id: pw-version
        working-directory: site
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.pw-version.outputs.version }}
      - name: Install Playwright browsers
        working-directory: site
        run: npx playwright install --with-deps chromium
      - name: Run local site-verify pipeline (S10 + S11 + S13 + sample-equivalence + S14 + S15-S16 macro-diff + S06 first-bar-parity + S18 gates)
        run: bash scripts/site-verify-local.sh
      # endregion:site-e2e-job
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: site-local-verify-report
          path: site/playwright-report/
          retention-days: 14
          if-no-files-found: ignore
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: site-local-verify-test-results
          path: site/test-results/
          retention-days: 14
          if-no-files-found: ignore
      - name: Upload local-verify summary artifacts
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: site-local-verify-summaries
          path: .gsd/artifacts/
          retention-days: 14
          if-no-files-found: ignore

  ci-complete:
    needs: [code-quality, build, engine-isolation, secrets-scan, code-coverage, webui-tests, pluginval-macos, pluginval-linux, wasm-build, site-lint, site-e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.code-quality.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]] || \
             [[ "${{ needs.engine-isolation.result }}" != "success" ]] || \
             [[ "${{ needs.secrets-scan.result }}" != "success" ]] || \
             [[ "${{ needs.code-coverage.result }}" != "success" ]] || \
             [[ "${{ needs.webui-tests.result }}" != "success" ]] || \
             [[ "${{ needs.pluginval-macos.result }}" != "success" ]] || \
             [[ "${{ needs.pluginval-linux.result }}" != "success" ]] || \
             [[ "${{ needs.wasm-build.result }}" != "success" ]] || \
             [[ "${{ needs.site-lint.result }}" != "success" ]] || \
             [[ "${{ needs.site-e2e.result }}" != "success" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed"
