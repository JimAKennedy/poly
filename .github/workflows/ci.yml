name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - run: pip install pre-commit
      - run: pre-commit run --all-files

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            cmake-args: -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=arm64 -DBUILD_VISUAL_TESTS=ON -DBUILD_INTERACTION_TESTS=ON -DSMTG_RUN_VST_VALIDATOR=ON
          - os: ubuntu-latest
            cmake-args: -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_INTERACTION_TESTS=ON -DSMTG_RUN_VST_VALIDATOR=ON
          - os: windows-2022
            cmake-args: -G "Visual Studio 17 2022" -DSMTG_RUN_VST_VALIDATOR=ON
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y ninja-build libx11-dev libxcb1-dev libxkbcommon-x11-dev libx11-xcb-dev libxcb-util-dev libxcb-cursor-dev libxcb-keysyms1-dev libxcb-xkb-dev libxkbcommon-dev libfontconfig1-dev libcairo2-dev libgtkmm-3.0-dev libsqlite3-dev libxcb-util0-dev
      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja
      - name: Cache VST3 SDK
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: build/_deps/vst3sdk-src
          key: vst3sdk-${{ matrix.os }}-${{ hashFiles('CMakeLists.txt') }}
      - name: Cache GoogleTest
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: build/_deps/googletest-src
          key: gtest-${{ matrix.os }}-${{ hashFiles('tests/CMakeLists.txt') }}
      - name: Configure
        run: cmake -S . -B build ${{ matrix.cmake-args }}
      - name: Build
        run: cmake --build build --config Release --parallel
      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure
      - name: Upload visual diffs
        if: failure() && runner.os == 'macOS'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: visual-diffs
          path: build/tests/visual_output/*_diff.png
          retention-days: 14
          if-no-files-found: ignore
      - name: Upload plugin
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: plugin-${{ matrix.os }}
          path: build/**/*.vst3
          retention-days: 14

  engine-isolation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install Ninja
        run: sudo apt-get install -y ninja-build
      - name: Configure engine-only (no VST3 SDK)
        run: cmake -S . -B build-engine -G Ninja -DCMAKE_BUILD_TYPE=Release -DPOLY_ENGINE_ONLY=ON
      - name: Build engine
        run: cmake --build build-engine --parallel
      - name: Run engine tests
        run: ctest --test-dir build-engine --output-on-failure
      - name: Verify no VST3 SDK fetched
        run: |
          if [ -d "build-engine/_deps/vst3sdk-src" ]; then
            echo "::error::Engine build fetched VST3 SDK — isolation violated"
            exit 1
          fi

  secrets-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  code-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install dependencies
        run: sudo apt-get install -y ninja-build lcov
      - name: Configure with coverage
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DENABLE_COVERAGE=ON -DPOLY_ENGINE_ONLY=ON
      - name: Build and test
        run: |
          cmake --build build
          ctest --test-dir build --output-on-failure
      - name: Generate coverage
        run: |
          lcov --capture --directory build --output-file coverage.info \
               --ignore-errors mismatch
          lcov --remove coverage.info '/usr/*' '*/build/_deps/*' '*/tests/*' \
               --output-file coverage.filtered.info
          genhtml coverage.filtered.info --output-directory coverage-report
      - name: Check 60% threshold
        run: |
          COVERAGE=$(lcov --summary coverage.filtered.info 2>&1 | grep 'lines' | awk '{print $2}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 60" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% below 60% threshold"
            exit 1
          fi
      - name: Upload to Codecov
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
        with:
          files: coverage.filtered.info
          fail_ci_if_error: false
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: coverage-report/

  webui-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - name: Install dependencies
        working-directory: webui
        run: npm ci
      - name: Get Playwright version
        id: pw-version
        working-directory: webui
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.pw-version.outputs.version }}
      - name: Install Playwright browsers
        working-directory: webui
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        working-directory: webui
        run: npx playwright test
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: webui-html-report
          path: webui/playwright-report/
          retention-days: 14
          if-no-files-found: ignore
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: webui-test-results
          path: webui/test-results/
          retention-days: 14
          if-no-files-found: ignore
      - name: Upload UI screenshots
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: webui-screenshots
          path: webui/test-results/screenshots/
          retention-days: 30
          if-no-files-found: ignore

  pluginval:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: plugin-macos-14
          - os: ubuntu-latest
            artifact: plugin-ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Download plugin artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        with:
          name: ${{ matrix.artifact }}
          path: plugin
      - name: Find VST3 bundle
        id: find-vst3
        run: |
          VST3_PATH=$(find plugin -name "*.vst3" -type d | head -1)
          echo "path=$VST3_PATH" >> "$GITHUB_OUTPUT"
          echo "Found VST3 at: $VST3_PATH"
      - name: Download pluginval
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            curl -fsSL -o pluginval.zip https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_macOS.zip
          else
            curl -fsSL -o pluginval.zip https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Linux.zip
          fi
          unzip -q pluginval.zip
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libfreetype6-dev libx11-dev libxcomposite-dev libxcursor-dev libxext-dev libxinerama-dev libxrandr-dev libxrender-dev
      - name: Run pluginval
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            chmod +x "pluginval.app/Contents/MacOS/pluginval"
            "pluginval.app/Contents/MacOS/pluginval" \
              --strictness-level 8 \
              --skip-gui-tests \
              --timeout-ms 120000 \
              --validate "${{ steps.find-vst3.outputs.path }}"
          else
            chmod +x pluginval
            xvfb-run -a ./pluginval \
              --strictness-level 8 \
              --skip-gui-tests \
              --timeout-ms 120000 \
              --validate "${{ steps.find-vst3.outputs.path }}"
          fi

  site-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Check site asset references
        run: bash scripts/check-site-assets.sh

  ci-complete:
    needs: [code-quality, build, engine-isolation, secrets-scan, code-coverage, webui-tests, pluginval, site-lint]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.code-quality.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]] || \
             [[ "${{ needs.engine-isolation.result }}" != "success" ]] || \
             [[ "${{ needs.secrets-scan.result }}" != "success" ]] || \
             [[ "${{ needs.code-coverage.result }}" != "success" ]] || \
             [[ "${{ needs.webui-tests.result }}" != "success" ]] || \
             [[ "${{ needs.pluginval.result }}" != "success" ]] || \
             [[ "${{ needs.site-lint.result }}" != "success" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed"
